name: CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build Java application
      run: ./mvnw clean package -DskipTests
      working-directory: rider-service

    - name: Build and push Docker images
      run: |
        TAG_SHA="${{ github.sha }}"
        NAMESPACE="${{ secrets.DOCKERHUB_USERNAME || 'dhruti313' }}"
        
        for service in auth-service rider-service driver-service trip-service; do
          if [ -f "$service/Dockerfile" ]; then
            echo "Building image for $service..."
            IMAGE_NAME="$NAMESPACE/cab-$service"
            
            docker build -t $IMAGE_NAME:$TAG_SHA -t $IMAGE_NAME:latest $service/
            
            echo "Pushing image for $service..."
            docker push $IMAGE_NAME:$TAG_SHA
            docker push $IMAGE_NAME:latest
          else
            echo "Skipping $service (no Dockerfile found)"
          fi
        done
    
    - name: Deploy to Kubernetes
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml
        export KUBECONFIG=kubeconfig.yaml
        NAMESPACE="${{ secrets.DOCKERHUB_USERNAME || 'dhruti313' }}"
        
        for service in auth-service rider-service driver-service trip-service; do
          if [ -f "$service/Dockerfile" ]; then
            echo "Updating deployment for $service..."
            kubectl set image deployment/$service $service=$NAMESPACE/cab-$service:${{ github.sha }} || echo "Failed to set image for deployment/$service (deployment might not exist yet)"
          fi
        done
