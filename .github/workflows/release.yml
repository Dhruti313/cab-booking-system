name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Determine version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"
      
      - name: Update version in pom.xml files
        run: |
          find . -name "pom.xml" -type f ! -path "./target/*" ! -path "./.idea/*" -exec sed -i "s/<version>1.0-SNAPSHOT<\/version>/<version>${{ steps.version.outputs.version }}<\/version>/g" {} \;
      
      - name: Build all services
        run: ./mvnw clean package -DskipTests
        working-directory: rider-service
      
      - name: Run tests
        run: ./mvnw verify
        working-directory: rider-service
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker images
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAMESPACE="${{ secrets.DOCKERHUB_USERNAME || 'dhruti313' }}"
          
          for service in rider-service driver-service trip-service; do
            if [ -f "$service/Dockerfile" ]; then
              echo "Building image for $service..."
              IMAGE_NAME="$NAMESPACE/cab-$service"
              
              docker build -t $IMAGE_NAME:$VERSION -t $IMAGE_NAME:latest $service/
              
              echo "Pushing image for $service..."
              docker push $IMAGE_NAME:$VERSION
              docker push $IMAGE_NAME:latest
            else
              echo "Skipping $service (no Dockerfile found)"
            fi
          done
      
      - name: Generate release notes
        id: release_notes
        run: |
          NAMESPACE="${{ secrets.DOCKERHUB_USERNAME || 'dhruti313' }}"
          VERSION="${{ steps.version.outputs.version }}"
          
          cat << EOF > release_notes.md
          # Cab Booking System Release ${VERSION}
          
          ## Release Date
          ${{ github.event.head_commit.timestamp }}
          
          ## What's Included
          
          This release includes:
          EOF

          if [ -d "rider-service/src" ]; then
            echo "- **Rider Service**: v${VERSION}" >> release_notes.md
          fi
          if [ -d "driver-service/src" ]; then
            echo "- **Driver Service**: v${VERSION}" >> release_notes.md
          fi
          if [ -d "trip-service/src" ]; then
            echo "- **Trip Service**: v${VERSION}" >> release_notes.md
          fi

          cat << EOF >> release_notes.md
          
          ## Docker Images
          
          \`\`\`bash
          EOF

          if [ -f "rider-service/Dockerfile" ]; then
            echo "docker pull ${NAMESPACE}/cab-rider-service:${VERSION}" >> release_notes.md
          fi
          if [ -f "driver-service/Dockerfile" ]; then
            echo "docker pull ${NAMESPACE}/cab-driver-service:${VERSION}" >> release_notes.md
          fi
          if [ -f "trip-service/Dockerfile" ]; then
            echo "docker pull ${NAMESPACE}/cab-trip-service:${VERSION}" >> release_notes.md
          fi

          cat << EOF >> release_notes.md
          \`\`\`
          
          ## Kubernetes Deployment
          
          \`\`\`bash
          kubectl apply -f infrastructure/k8s/
          \`\`\`
          
          See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          EOF
          
          cat release_notes.md >> $GITHUB_STEP_SUMMARY
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            rider-service/target/*.jar
            driver-service/target/*.jar
            trip-service/target/*.jar
          retention-days: 30
      
      - name: Commit version update
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push || echo "Nothing to push"
