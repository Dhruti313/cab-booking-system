apiVersion: apps/v1
kind: Deployment
metadata:
  name: rider-service
  labels:
    app: rider-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rider-service
  template:
    metadata:
      labels:
        app: rider-service
    spec:
      containers:
      - name: rider-service
        image: dhruti31/cab-rider-service:latest
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SERVER_PORT
          value: "8081"
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: cab-config
              key: spring_datasource_url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: cab-secrets
              key: spring_datasource_username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cab-secrets
              key: spring_datasource_password
        - name: EUREKA_CLIENT_ENABLED
          value: "false"
        - name: SPRING_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: cab-config
              key: spring_redis_host
        - name: SPRING_REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: cab-config
              key: spring_redis_port
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: cab-config
              key: spring_kafka_bootstrap_servers
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: cab-config
              key: eureka_client_serviceurl_defaultzone
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          value: "health,metrics,prometheus"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 40
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 20
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rider-service
spec:
  selector:
    app: rider-service
  ports:
  - port: 80
    targetPort: 8081
  type: ClusterIP
